name: CI

on:
  push:
    branches: [master, main, 'feat/**']
    # Documentation-only changes cannot affect the build or the test gate, so
    # they must not spin up the full compile/test matrix.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Always supersede an older in-flight run for the same ref. This keeps CI on
  # the latest commit and prevents a run whose runner is stuck in the queue
  # (e.g. scarce hosted macOS runners) from blocking newer runs behind it.
  cancel-in-progress: true

jobs:
  build-and-verify:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: macos-arm64
            runner: macos-14
          - name: macos-x64
            runner: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          # gcc provides -fopenmp natively on Linux; nothing else is required.

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libomp
          # Accelerate and Metal ship with the OS. The OpenMP examples link
          # against Homebrew libomp; the Makefile discovers it via brew --prefix.

      - name: Compiler and platform info
        run: |
          uname -srm
          ${CC:-cc} --version | head -1 || true

      - name: Build core library and v3 self-test
        run: make

      - name: Full verification (core suites + all 44 examples)
        shell: bash
        run: |
          set -o pipefail
          # The OpenMP-linked examples need libomp on the runtime path on macOS.
          if [ "$RUNNER_OS" = "macOS" ]; then
            export DYLD_LIBRARY_PATH="$(brew --prefix libomp)/lib:${DYLD_LIBRARY_PATH:-}"
          fi
          make verify_all 2>&1 | tee verify_all.log

      - name: Upload verification log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verify-log-${{ matrix.name }}
          path: verify_all.log
          if-no-files-found: ignore
